<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" role="img" aria-labelledby="title desc">
  <title id="title">Yellow Explorer Token</title>
  <desc id="desc">Cheerful kid explorer standing on a yellow jungle token base.</desc>
  <defs>
