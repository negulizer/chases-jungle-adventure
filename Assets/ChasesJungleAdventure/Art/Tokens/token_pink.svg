<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" role="img" aria-labelledby="title desc">
  <title id="title">Pink Explorer Token</title>
  <desc id="desc">Bubbly kid explorer standing on a pink jungle token base.</desc>
  <defs>
    <filter id="base-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#7A2956" flood-opacity="0.35"/>
    </filter>
  </defs>
  <g id="pink-token">
    <ellipse id="pink-base-shadow" cx="100" cy="162" rx="56" ry="16" fill="#7A2956" opacity="0.28"/>
    <g id="pink-base" filter="url(#base-shadow)">
      <ellipse cx="100" cy="152" rx="58" ry="18" fill="#AF3F7E" stroke="#3A1330" stroke-width="4"/>
      <ellipse cx="100" cy="146" rx="56" ry="16" fill="#FF6CB5" stroke="#3A1330" stroke-width="4"/>
      <ellipse cx="88" cy="141" rx="24" ry="7" fill="#FFC0E3" opacity="0.7"/>
    </g>
    <g id="pink-explorer" stroke="#351024" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <ellipse id="legs" cx="100" cy="134" rx="17" ry="16" fill="#4B9FB4"/>
      <rect id="shirt" x="82" y="103" width="36" height="34" rx="12" fill="#FF9CD0"/>
      <circle id="head" cx="100" cy="82" r="28" fill="#FFD7BE"/>
      <path id="hair" d="M77 83c4-15 15-24 28-24s24 8 28 23c-8-4-17-6-28-6s-20 2-28 7z" fill="#4A2F23"/>
      <g id="hat">
        <ellipse cx="100" cy="62" rx="31" ry="10" fill="#E6C67F"/>
        <rect x="85" y="44" width="30" height="18" rx="8" fill="#F3D696"/>
      </g>
      <circle id="left-eye" cx="91" cy="83" r="5" fill="#FFFFFF"/>
      <circle id="right-eye" cx="109" cy="83" r="5" fill="#FFFFFF"/>
      <circle cx="91" cy="84" r="2" fill="#351024" stroke="none"/>
      <circle cx="109" cy="84" r="2" fill="#351024" stroke="none"/>
      <path id="smile" d="M92 95c4 4 12 4 16 0" fill="none"/>
      <circle id="left-cheek" cx="84" cy="92" r="4" fill="#FF86AF" stroke="none" opacity="0.85"/>
      <circle id="right-cheek" cx="116" cy="92" r="4" fill="#FF86AF" stroke="none" opacity="0.85"/>
      <path id="left-arm" d="M82 114l-13 10" fill="none"/>
      <path id="right-arm" d="M118 114l13 10" fill="none"/>
      <path id="left-leg" d="M93 136l-6 11" fill="none"/>
      <path id="right-leg" d="M107 136l6 11" fill="none"/>
